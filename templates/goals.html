{% extends "base.html" %}

{% block content %}

<h1>🎯 My Goals</h1>

<div class="card p-4 mt-4">

<form method="POST" action="/add_goal">

<label>
Goal Name
</label>

<input 
type="text" 
name="title" 
class="form-control"
placeholder="Example: Swim 20km this month"
required
>


<label class="mt-3">
Target Distance (meters)
</label>

<input 
type="number" 
name="target"
class="form-control"
placeholder="20000"
required
>


<button class="btn btn-primary mt-3">
Create Goal
</button>

</form>

</div>


{% endblock %}
