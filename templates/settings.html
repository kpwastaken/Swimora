{% extends "base.html" %}

{% block content %}


<h1>⚙️ Settings</h1>


<div class="card shadow p-4 mb-4">


<h3>🎨 Appearance</h3>


<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="darkModeToggle">

<label class="form-check-label">
🌙 Dark Mode
</label>

</div>


</div>





<div class="card shadow p-4 mb-4">


<h3>📏 Units</h3>


<label>
Distance Unit
</label>


<select class="form-select">

<option>
Meters (m)
</option>


<option>
Yards (yd)
</option>


</select>


</div>





<div class="card shadow p-4 mb-4">


<h3>🔔 Notifications</h3>


<div class="form-check form-switch">


<input
class="form-check-input"
type="checkbox"
checked>


<label class="form-check-label">
Workout reminders
</label>


</div>



</div>





<div class="card shadow p-4">


<h3>👤 Account</h3>


<a
class="btn btn-danger"
href="/logout">

Logout

</a>


</div>



{% endblock %}
